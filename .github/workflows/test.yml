name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create required directories
        run: mkdir -p output

      - name: Make scripts executable
        run: chmod +x scripts/*.sh tests/*.sh

      - name: Run tests
        run: bash tests/test.sh
